<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人決算｜Balance Sheet</title>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #172033;
      --sub: #6b7280;
      --line: #e5e7eb;
      --blue: #2563eb;
      --green: #10b981;
      --red: #ef4444;
      --amber: #f59e0b;
      --purple: #8b5cf6;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 28px 18px 60px;
    }

    .hero {
      position: relative;
      background: linear-gradient(135deg, #111827, #1e3a8a);
      color: white;
      border-radius: 30px;
      padding: 30px;
      margin-bottom: 22px;
      box-shadow: var(--shadow);
    }

    .period-badge {
      position: absolute;
      top: 22px;
      right: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.78);
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 10px;
      border-radius: 999px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-size: 30px;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.78);
      line-height: 1.7;
      max-width: 720px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      border: 1px solid rgba(229,231,235,0.8);
    }

    .span-3 { grid-column: span 3; }
    .span-4 { grid-column: span 4; }
    .span-6 { grid-column: span 6; }
    .span-8 { grid-column: span 8; }
    .span-12 { grid-column: span 12; }

    .card-title {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 700;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .small {
      font-size: 12px;
      color: var(--sub);
      font-weight: 500;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.04em;
      margin: 4px 0;
    }

    .kpi-sub {
      font-size: 13px;
      color: var(--sub);
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 12px 6px;
      border-bottom: 1px solid var(--line);
      text-align: right;
    }

    th:first-child, td:first-child {
      text-align: left;
    }

    th {
      color: var(--sub);
      font-size: 12px;
      font-weight: 700;
    }

    .total-row td {
      font-weight: 800;
      border-top: 2px solid #111827;
      border-bottom: none;
    }

    .input-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
      font-weight: 600;
    }

    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      font-size: 14px;
      background: #f9fafb;
    }

    button {
      border: none;
      background: var(--blue);
      color: white;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .full-button {
      grid-column: span 2;
    }

    .bars {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bar-row {
      display: grid;
      grid-template-columns: 90px 1fr 90px;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .bar-bg {
      height: 12px;
      background: #eef2ff;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      border-radius: 999px;
      background: var(--blue);
    }

    .note {
      margin-top: 12px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      .span-3, .span-4, .span-6, .span-8 {
        grid-column: span 12;
      }

      .hero {
        padding: 26px 20px;
      }

      .period-badge {
        position: static;
        display: inline-block;
        margin-bottom: 14px;
      }

      .input-area {
        grid-template-columns: 1fr;
      }

      .full-button {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <section class="hero">
      <div class="period-badge" id="periodBadge">2026/04 決算</div>
      <h1>個人決算ダッシュボード</h1>
      <p>
        あなた自身をひとつの会社として捉え、資産・負債・純資産を月次で分析する。
        毎月の資産状況を記録し、前月比較と中期目標に対する進捗を確認します。
      </p>
    </section>

    <section class="grid">

      <div class="card span-3">
        <h2 class="card-title">総資産</h2>
        <div class="kpi-value" id="totalAssets">¥0</div>
        <div class="kpi-sub" id="assetChange">前月比 ¥0</div>
      </div>

      <div class="card span-3">
        <h2 class="card-title">負債</h2>
        <div class="kpi-value" id="totalLiabilities">¥0</div>
        <div class="kpi-sub" id="liabilityChange">前月比 ¥0</div>
      </div>

      <div class="card span-3">
        <h2 class="card-title">ネットアセッツ</h2>
        <div class="kpi-value" id="netAssets">¥0</div>
        <div class="kpi-sub" id="netAssetChange">前月比 ¥0</div>
      </div>

      <div class="card span-3">
        <h2 class="card-title">自己資本比率</h2>
        <div class="kpi-value" id="equityRatio">0.0%</div>
        <div class="kpi-sub">純資産 ÷ 総資産</div>
      </div>

      <div class="card span-8">
        <h2 class="card-title">BS：貸借対照表 <span class="small" id="bsMonthLabel">2026年4月</span></h2>
        <table>
          <thead>
            <tr>
              <th>項目</th>
              <th>金額</th>
              <th>前月比</th>
            </tr>
          </thead>
          <tbody id="bsTable"></tbody>
        </table>
      </div>

      <div class="card span-4">
        <h2 class="card-title" id="assetCompositionTitle">2026年4月の資産構成</h2>

        <div class="bars" id="assetBars"></div>

        <div class="input-area">
          <div>
            <label>対象月</label>
            <input type="month" id="inputMonth" value="2026-04" />
          </div>

          <div>
            <label>現金・預金</label>
            <input type="number" id="cashInput" value="1200000" />
          </div>

          <div>
            <label>投資資産</label>
            <input type="number" id="investmentInput" value="2800000" />
          </div>

          <div>
            <label>その他資産</label>
            <input type="number" id="otherAssetInput" value="300000" />
          </div>

          <div>
            <label>住宅ローン等</label>
            <input type="number" id="loanInput" value="0" />
          </div>

          <div>
            <label>その他負債</label>
            <input type="number" id="otherLiabilityInput" value="120000" />
          </div>

          <button class="full-button" onclick="updateDashboard()">月次決算を更新</button>
        </div>

        <p class="note">
          最新月の月次決算をこのボード内で入力し、そのままBS・KPI・資産構成に反映します。
        </p>
      </div>

      <div class="card span-6">
        <h2 class="card-title">前月比較</h2>
        <table>
          <thead>
            <tr>
              <th>指標</th>
              <th>前月</th>
              <th>当月</th>
              <th>前月比</th>
            </tr>
          </thead>
          <tbody id="comparisonTable"></tbody>
        </table>
      </div>

      <div class="card span-6">
        <h2 class="card-title">中経進捗</h2>
        <table>
          <thead>
            <tr>
              <th>目標</th>
              <th>現在</th>
              <th>目標</th>
              <th>進捗率</th>
            </tr>
          </thead>
          <tbody id="targetTable"></tbody>
        </table>
      </div>

    </section>
  </div>

  <script>
    const previousMonth = {
      month: "2026-03",
      cash: 1000000,
      investment: 2500000,
      otherAsset: 300000,
      loan: 0,
      otherLiability: 150000
    };

    const mediumTermTarget = {
      netAssets: 8000000,
      investment: 5000000,
      cash: 1500000
    };

    function yen(num) {
      return "¥" + Math.round(num).toLocaleString("ja-JP");
    }

    function pct(num) {
      return (num * 100).toFixed(1) + "%";
    }

    function formatMonth(monthValue) {
      const [year, month] = monthValue.split("-");
      return `${Number(year)}年${Number(month)}月`;
    }

    function calc(data) {
      const assets = data.cash + data.investment + data.otherAsset;
      const liabilities = data.loan + data.otherLiability;
      const netAssets = assets - liabilities;
      const equityRatio = assets === 0 ? 0 : netAssets / assets;

      return {
        assets,
        liabilities,
        netAssets,
        equityRatio
      };
    }

    function diff(current, previous) {
      return current - previous;
    }

    function diffClass(value) {
      if (value > 0) return "positive";
      if (value < 0) return "negative";
      return "";
    }

    function getCurrentInput() {
      return {
        month: document.getElementById("inputMonth").value,
        cash: Number(document.getElementById("cashInput").value || 0),
        investment: Number(document.getElementById("investmentInput").value || 0),
        otherAsset: Number(document.getElementById("otherAssetInput").value || 0),
        loan: Number(document.getElementById("loanInput").value || 0),
        otherLiability: Number(document.getElementById("otherLiabilityInput").value || 0)
      };
    }

    function updateDashboard() {
      const current = getCurrentInput();
      const now = calc(current);
      const prev = calc(previousMonth);

      document.getElementById("periodBadge").textContent =
        current.month.replace("-", "/") + " 決算";

      document.getElementById("bsMonthLabel").textContent =
        formatMonth(current.month);

      document.getElementById("assetCompositionTitle").textContent =
        formatMonth(current.month) + "の資産構成";

      document.getElementById("totalAssets").textContent = yen(now.assets);
      document.getElementById("totalLiabilities").textContent = yen(now.liabilities);
      document.getElementById("netAssets").textContent = yen(now.netAssets);
      document.getElementById("equityRatio").textContent = pct(now.equityRatio);

      document.getElementById("assetChange").textContent =
        "前月比 " + yen(diff(now.assets, prev.assets));

      document.getElementById("liabilityChange").textContent =
        "前月比 " + yen(diff(now.liabilities, prev.liabilities));

      document.getElementById("netAssetChange").textContent =
        "前月比 " + yen(diff(now.netAssets, prev.netAssets));

      document.getElementById("netAssetChange").className =
        "kpi-sub " + diffClass(diff(now.netAssets, prev.netAssets));

      renderBSTable(current, previousMonth);
      renderAssetBars(current);
      renderComparison(current, previousMonth);
      renderTargets(current);
    }

    function renderBSTable(current, previous) {
      const rows = [
        ["現金・預金", current.cash, previous.cash],
        ["投資資産", current.investment, previous.investment],
        ["その他資産", current.otherAsset, previous.otherAsset],
        ["資産合計", current.cash + current.investment + current.otherAsset, previous.cash + previous.investment + previous.otherAsset, true],
        ["住宅ローン等", current.loan, previous.loan],
        ["その他負債", current.otherLiability, previous.otherLiability],
        ["負債合計", current.loan + current.otherLiability, previous.loan + previous.otherLiability, true],
        ["純資産", calc(current).netAssets, calc(previous).netAssets, true]
      ];

      const html = rows.map(row => {
        const [name, currentValue, previousValue, isTotal] = row;
        const difference = currentValue - previousValue;

        return `
          <tr class="${isTotal ? "total-row" : ""}">
            <td>${name}</td>
            <td>${yen(currentValue)}</td>
            <td class="${diffClass(difference)}">前月比 ${yen(difference)}</td>
          </tr>
        `;
      }).join("");

      document.getElementById("bsTable").innerHTML = html;
    }

    function renderAssetBars(current) {
      const total = current.cash + current.investment + current.otherAsset;

      const items = [
        ["現金・預金", current.cash],
        ["投資資産", current.investment],
        ["その他資産", current.otherAsset]
      ];

      const html = items.map(([name, value]) => {
        const ratio = total === 0 ? 0 : value / total;
        return `
          <div class="bar-row">
            <div>${name}</div>
            <div class="bar-bg">
              <div class="bar" style="width:${ratio * 100}%"></div>
            </div>
            <div>${pct(ratio)}</div>
          </div>
        `;
      }).join("");

      document.getElementById("assetBars").innerHTML = html;
    }

    function renderComparison(current, previous) {
      const now = calc(current);
      const prev = calc(previous);

      const rows = [
        ["総資産", prev.assets, now.assets],
        ["負債", prev.liabilities, now.liabilities],
        ["ネットアセッツ", prev.netAssets, now.netAssets],
        ["自己資本比率", prev.equityRatio, now.equityRatio, "percent"]
      ];

      const html = rows.map(([name, prevValue, nowValue, type]) => {
        const difference = nowValue - prevValue;

        return `
          <tr>
            <td>${name}</td>
            <td>${type === "percent" ? pct(prevValue) : yen(prevValue)}</td>
            <td>${type === "percent" ? pct(nowValue) : yen(nowValue)}</td>
            <td class="${diffClass(difference)}">
              前月比 ${type === "percent" ? (difference * 100).toFixed(1) + "pt" : yen(difference)}
            </td>
          </tr>
        `;
      }).join("");

      document.getElementById("comparisonTable").innerHTML = html;
    }

    function renderTargets(current) {
      const now = calc(current);

      const rows = [
        ["純資産目標", now.netAssets, mediumTermTarget.netAssets],
        ["投資資産目標", current.investment, mediumTermTarget.investment],
        ["現金・預金目標", current.cash, mediumTermTarget.cash]
      ];

      const html = rows.map(([name, currentValue, targetValue]) => {
        const progress = targetValue === 0 ? 0 : currentValue / targetValue;

        return `
          <tr>
            <td>${name}</td>
            <td>${yen(currentValue)}</td>
            <td>${yen(targetValue)}</td>
            <td>${pct(progress)}</td>
          </tr>
        `;
      }).join("");

      document.getElementById("targetTable").innerHTML = html;
    }

    updateDashboard();
  </script>
</body>
</html>
