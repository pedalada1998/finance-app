<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>資産ノート</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {background:#f5f3ee;color:#18202a;font-family:-apple-system;padding:20px}
.card {background:#fff;padding:20px;border-radius:20px;margin-top:20px}
input,button {padding:10px;margin:5px;border-radius:10px;border:1px solid #ccc}
button {background:#18202a;color:#fff}
</style>
</head>

<body>

<h1>📊 資産ダッシュボード</h1>

<div class="card">
  <input id="month" placeholder="月（例：2026/05）">
  <input id="amount" placeholder="総資産">
  <button onclick="addData()">追加</button>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>
let labels = ['2026/01','02','03','04'];
let data = [7081607,7205492,6672884,7156754];

const ctx = document.getElementById('chart');

let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: '総資産',
      data: data,
      borderColor: '#b9935a'
    }]
  }
});

function addData(){
  const m = document.getElementById('month').value;
  const a = Number(document.getElementById('amount').value);

  labels.push(m);
  data.push(a);

  chart.update();
}
</script>

</body>
</html>
