<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>資産ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;background:#f5f3ee;margin:0;padding:20px;color:#222}
h1{margin-bottom:10px}
.panel{background:white;padding:20px;border-radius:16px;margin-bottom:16px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.kpi{background:#18202a;color:white;padding:14px;border-radius:12px}
.kpi small{opacity:.7}
.kpi b{display:block;font-size:20px;margin-top:6px}
.bs-row{display:flex;justify-content:space-between;padding:6px 0}
.bs-total{font-weight:bold;border-top:1px solid #ccc;margin-top:6px;padding-top:6px}
.bs-net{background:#18202a;color:white;padding:10px;border-radius:10px;margin-top:10px}
canvas{max-width:100%}
</style>
</head>

<body>

<h1>資産ダッシュボード</h1>

<div class="panel">
<div class="kpis">
<div class="kpi"><small>前月比</small><b id="mom">-</b></div>
<div class="kpi"><small>前年比</small><b id="yoy">-</b></div>
<div class="kpi"><small>投資比率</small><b id="invest">-</b></div>
<div class="kpi"><small>現金余力</small><b id="cash">-</b></div>
</div>
</div>

<div class="panel">
<h2>Balance Sheet</h2>
<div id="bs"></div>
</div>

<div class="panel">
<h2>BSチャート</h2>
<canvas id="bsChart"></canvas>
</div>

<script>
const categories = [
{name:'預金',side:'asset',type:'cash'},
{name:'NASDAQ',side:'asset',type:'invest'},
{name:'インド',side:'asset',type:'invest'},
{name:'BTC',side:'asset',type:'invest'},
{name:'DC',side:'asset',type:'retire'},
{name:'持株会',side:'asset',type:'invest'},
{name:'住宅ローン',side:'liability',type:'other'}
];

const records = [
{month:'2025/04',values:{預金:500000,NASDAQ:300000,インド:200000,BTC:100000,DC:2000000,持株会:1000000,住宅ローン:0}},
{month:'2026/04',values:{預金:600000,NASDAQ:600000,インド:500000,BTC:100000,DC:3000000,持株会:2000000,住宅ローン:0}}
];

const yen = n => "¥"+n.toLocaleString();

const latest = records[records.length-1];
const prev = records[records.length-2];

function totalOf(r){
return categories.reduce((s,c)=>s+(r.values[c.name]||0),0);
}

const total = totalOf(latest);
const prevTotal = totalOf(prev);

const mom = total - prevTotal;
const momRate = mom/prevTotal*100;

const yearAgo = records.find(r=>r.month==="2025/04");
const yoy = total - totalOf(yearAgo);

const cash = latest.values['預金'];
const invest = categories
.filter(c=>c.type==='invest')
.reduce((s,c)=>s+(latest.values[c.name]||0),0);

document.getElementById('mom').innerText = yen(mom);
document.getElementById('yoy').innerText = yen(yoy);
document.getElementById('invest').innerText = ((invest/total*100).toFixed(1)+"%");
document.getElementById('cash').innerText = yen(cash);

const assets = categories.filter(c=>c.side==='asset');
const liabilities = categories.filter(c=>c.side==='liability');

const totalAssets = assets.reduce((s,c)=>s+(latest.values[c.name]||0),0);
const totalLiabilities = liabilities.reduce((s,c)=>s+(latest.values[c.name]||0),0);
const net = totalAssets - totalLiabilities;

document.getElementById('bs').innerHTML = `
<h3>資産</h3>
${assets.map(c=>`<div class="bs-row"><span>${c.name}</span><b>${yen(latest.values[c.name]||0)}</b></div>`).join('')}
<div class="bs-total">資産合計 ${yen(totalAssets)}</div>

<h3>負債</h3>
${liabilities.map(c=>`<div class="bs-row"><span>${c.name}</span><b>${yen(latest.values[c.name]||0)}</b></div>`).join('')}
<div class="bs-total">負債合計 ${yen(totalLiabilities)}</div>

<div class="bs-net">純資産 ${yen(net)}</div>
`;

new Chart(document.getElementById('bsChart'), {
type:'bar',
data:{
labels:['資産','負債','純資産'],
datasets:[{
data:[totalAssets,totalLiabilities,net],
backgroundColor:['#b9935a','#c25b5b','#2f8f66']
}]
}
});
</script>

</body>
</html>
