<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personal Financial Statement</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:-apple-system,system-ui;
  background:#f5f3ee;
  margin:0;
  padding:20px;
  color:#18202a;
}

h1{margin-bottom:10px}

.panel{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-bottom:16px;
}

.hero{
  background:#18202a;
  color:white;
  padding:24px;
  border-radius:16px;
}

.hero h2{
  margin:0;
  font-size:32px;
}

.total{
  font-size:48px;
  margin:10px 0;
}

.kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.kpi{
  background:#18202a;
  color:white;
  padding:12px;
  border-radius:10px;
}

.kpi small{opacity:.7}
.kpi b{display:block;margin-top:6px}

canvas{max-width:100%}
</style>
</head>

<body>

<div class="hero">
<h2>Personal Financial Statement</h2>
<p>個人資産も、決算するべきだ。</p>

<div class="total" id="net">¥0</div>

<div class="kpis">
<div class="kpi"><small>資産合計</small><b id="asset"></b></div>
<div class="kpi"><small>負債合計</small><b id="debt"></b></div>
<div class="kpi"><small>前月増減</small><b id="mom"></b></div>
<div class="kpi"><small>前年増減</small><b id="yoy"></b></div>
</div>
</div>

<div class="panel">
<h3>純資産推移</h3>
<select id="period" onchange="render()">
<option value="3">3ヶ月</option>
<option value="6">6ヶ月</option>
<option value="12">1年</option>
<option value="36">3年</option>
<option value="60">5年</option>
<option value="120">10年</option>
</select>
<canvas id="trend"></canvas>
</div>

<div class="panel">
<h3>資産構成</h3>
<select id="mode" onchange="render()">
<option value="cat">資産別</option>
<option value="type">分類別</option>
<option value="bs">BS</option>
</select>
<canvas id="pie"></canvas>
</div>

<div class="panel">
<h3>AI決算コメント</h3>
<div id="comment"></div>
</div>

<div class="panel">
<h3>月次決算入力</h3>
<input id="month" placeholder="2026/05">
<button onclick="save()">決算確定</button>
<div id="inputs"></div>
</div>

<script>

const cat=[
{name:"預金",side:"asset",type:"cash"},
{name:"NASDAQ",side:"asset",type:"invest"},
{name:"住宅ローン",side:"liability",type:"other"}
];

let data=[
{m:"2026/03",v:{預金:500000,NASDAQ:300000,住宅ローン:0}},
{m:"2026/04",v:{預金:600000,NASDAQ:600000,住宅ローン:0}}
];

const yen=n=>"¥"+n.toLocaleString();

function total(r){
return cat.reduce((s,c)=>s+(r.v[c.name]||0),0);
}

function asset(r){
return cat.filter(c=>c.side==="asset").reduce((s,c)=>s+(r.v[c.name]||0),0);
}

function debt(r){
return cat.filter(c=>c.side==="liability").reduce((s,c)=>s+(r.v[c.name]||0),0);
}

let tChart,pChart;

function render(){
const last=data[data.length-1];
const prev=data[data.length-2]||last;

const net=asset(last)-debt(last);
const prevNet=asset(prev)-debt(prev);

document.getElementById("net").innerText=yen(net);
document.getElementById("asset").innerText=yen(asset(last));
document.getElementById("debt").innerText=yen(debt(last));
document.getElementById("mom").innerText=yen(net-prevNet);

const year=data.find(r=>r.m==="2025/04");
document.getElementById("yoy").innerText=year?yen(net-(asset(year)-debt(year))):"-";

if(tChart) tChart.destroy();

const p=Number(document.getElementById("period").value);
const slice=data.slice(-p);

tChart=new Chart(document.getElementById("trend"),{
type:"line",
data:{
labels:slice.map(r=>r.m),
datasets:[{data:slice.map(r=>asset(r)-debt(r)),borderColor:"#b9935a"}]
}
});

if(pChart) pChart.destroy();

const mode=document.getElementById("mode").value;

let labels=[],values=[];

if(mode==="cat"){
labels=cat.filter(c=>c.side==="asset").map(c=>c.name);
values=labels.map(n=>last.v[n]||0);
}
else if(mode==="type"){
let sum={cash:0,invest:0,other:0};
cat.forEach(c=>{
if(c.side==="asset") sum[c.type]+=last.v[c.name]||0;
});
labels=Object.keys(sum);
values=Object.values(sum);
}
else{
labels=["資産","負債","純資産"];
values=[asset(last),debt(last),net];
}

pChart=new Chart(document.getElementById("pie"),{
type:"pie",
data:{labels,datasets:[{data:values}]}
});

document.getElementById("comment").innerText=
"純資産は"+yen(net)+"。前月比"+yen(net-prevNet)+"。投資比率は"+Math.round(values[0]/net*100)+"%。";
}

function save(){
const m=document.getElementById("month").value;
if(!m) return alert("月を入力");

const obj={m,v:{}};

cat.forEach(c=>{
obj.v[c.name]=Number(prompt(c.name)||0);
});

data.push(obj);
render();
}

render();

</script>

</body>
</html>
