<!doctype html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personal Financial Statement</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;
  margin:0;
  background:#f5f3ee;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h1{font-size:20px}

.page{display:none}
.page.active{display:block}

.nav{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.nav button{
  flex:1;
  padding:12px;
  border-radius:12px;
  border:none;
  background:#222;
  color:white;
  font-weight:bold;
}

.card{
  background:white;
  border-radius:18px;
  padding:20px;
  margin-bottom:15px;
}

.kpi{
  font-size:32px;
  font-weight:bold;
}

.small{
  color:#777;
  font-size:12px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid #eee;
}

.pos{color:green}
.neg{color:red}

</style>
</head>

<body>
<div class="container">

<h1>個人資産ダッシュボード</h1>

<div class="nav">
<button onclick="showPage('dashboard')">ダッシュボード</button>
<button onclick="showPage('input')">月次決算入力</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page active">

<div class="card">
<div class="small">純資産</div>
<div class="kpi" id="netAsset">¥0</div>
<div id="netChange"></div>
<div id="highWater"></div>
<div id="benchmarkRank"></div>
</div>

<div class="card">
<canvas id="trendChart"></canvas>
</div>

<div class="card">
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h3>個人財務諸表（BS）</h3>
<div id="bsTable"></div>
</div>

<div class="card">
<h3>前月比較</h3>
<div id="momTable"></div>
</div>

<div class="card">
<h3>中期資産計画</h3>

<input id="target" placeholder="目標資産">
<input id="years" placeholder="年数">

<button onclick="calcPlan()">更新</button>

<div id="planResult"></div>
</div>

</div>
<!-- INPUT PAGE -->
<div id="input" class="page">

<div class="card">
<h3>月次決算入力</h3>
<p class="small">月次決算は3分で完了します。前月・前々月を見ながら、今月の残高だけ入力してください。</p>

<input id="month" placeholder="例：2026/05">

<div id="inputs"></div>

<button onclick="saveMonth()">月次決算を確定</button>
</div>

<div class="card">
<h3>勘定科目設定</h3>

<input id="newName" placeholder="例：楽天証券、住宅ローン">

<select id="newSide">
  <option value="asset">資産</option>
  <option value="liability">負債</option>
</select>

<select id="newType">
  <option value="cash">現金・預金系</option>
  <option value="invest">投資系</option>
  <option value="retire">退職資産系</option>
  <option value="other">その他</option>
</select>

<button onclick="addCategory()">勘定科目を追加</button>

<div id="categoryList"></div>
</div>

<div class="card">
<h3>同世代ベンチマーク</h3>

<input id="age" type="number" placeholder="年齢" value="27">

<select id="household">
  <option value="couple">二人以上世帯</option>
  <option value="single">単身世帯</option>
</select>

<select id="basis">
  <option value="median">中央値</option>
  <option value="average">平均値</option>
</select>

<button onclick="render()">ベンチマーク更新</button>

<div id="benchmark"></div>

<p class="small">
注：比較データはJ-FLEC「家計の金融行動に関する世論調査2025年」の年代別金融資産保有額を参考にした固定値です。
本アプリの資産合計とは定義が完全には一致しないため、比較は目安です。
推定上位割合は平均値・中央値から簡易的に近似したもので、厳密な順位ではありません。
</p>
</div>

</div>

</div>

<script>
const yen = n => "¥" + Math.round(Number(n)||0).toLocaleString();

let categories = JSON.parse(localStorage.getItem("categories") || "null") || [
  {name:"預金", side:"asset", type:"cash"},
  {name:"NASDAQ", side:"asset", type:"invest"},
  {name:"インド", side:"asset", type:"invest"},
  {name:"Bitcoin", side:"asset", type:"invest"},
  {name:"確定拠出年金", side:"asset", type:"retire"},
  {name:"持株会", side:"asset", type:"invest"},
  {name:"カード未払", side:"liability", type:"other"},
  {name:"住宅ローン", side:"liability", type:"other"}
];

let records = JSON.parse(localStorage.getItem("records") || "null") || [
  {
    month:"2025/04",
    values:{
      預金:520000,
      NASDAQ:260000,
      インド:210000,
      Bitcoin:78000,
      確定拠出年金:2100000,
      持株会:1450000,
      カード未払:0,
      住宅ローン:0
    }
  },
  {
    month:"2026/03",
    values:{
      預金:816387,
      NASDAQ:487749,
      インド:425933,
      Bitcoin:82096,
      確定拠出年金:2650389,
      持株会:2151560,
      カード未払:0,
      住宅ローン:0
    }
  },
  {
    month:"2026/04",
    values:{
      預金:644667,
      NASDAQ:605254,
      インド:510791,
      Bitcoin:102871,
      確定拠出年金:2941357,
      持株会:2291265,
      カード未払:0,
      住宅ローン:0
    }
  }
];

const typeName = {
  cash:"現金・預金系",
  invest:"投資系",
  retire:"退職資産系",
  other:"その他"
};

const benchmarkData = {
  single:{
    20:{average:2550000, median:370000},
    30:{average:5010000, median:1000000},
    40:{average:8590000, median:1000000},
    50:{average:9990000, median:1200000},
    60:{average:13640000, median:3000000},
    70:{average:14890000, median:5000000}
  },
  couple:{
    20:{average:5250000, median:1250000},
    30:{average:10960000, median:3110000},
    40:{average:14860000, median:5000000},
    50:{average:19080000, median:7000000},
    60:{average:26830000, median:14000000},
    70:{average:24160000, median:11780000}
  }
};

let trendChart;
let pieChart;

function saveState(){
  localStorage.setItem("categories", JSON.stringify(categories));
  localStorage.setItem("records", JSON.stringify(records));
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  render();
}

function sortRecords(){
  records.sort((a,b)=>a.month.localeCompare(b.month));
}

function latest(){
  sortRecords();
  return records[records.length-1];
}

function assetTotal(record){
  return categories
    .filter(c=>c.side==="asset")
    .reduce((s,c)=>s+Number(record.values[c.name]||0),0);
}

function liabilityTotal(record){
  return categories
    .filter(c=>c.side==="liability")
    .reduce((s,c)=>s+Number(record.values[c.name]||0),0);
}

function netAsset(record){
  return assetTotal(record)-liabilityTotal(record);

}
function render(){

  const latestRecord = latest()
  const prev = records[records.length-2]

  const net = netAsset(latestRecord)
  const prevNet = prev ? netAsset(prev) : 0

  document.getElementById("netAsset").innerText = yen(net)

  const diff = net - prevNet
  const rate = prevNet ? diff/prevNet*100 : 0

  document.getElementById("netChange").innerHTML =
    `<span class="${diff>=0?'pos':'neg'}">
      ${diff>=0?'+':''}${yen(diff)}（${rate.toFixed(1)}%）
    </span>`

  // 過去最高
  const max = Math.max(...records.map(r=>netAsset(r)))
  const ratio = net/max*100
  document.getElementById("highWater").innerText =
    `過去最高比 ${ratio.toFixed(1)}%`

  // グラフ
  if(trendChart) trendChart.destroy()
  trendChart = new Chart(document.getElementById("trendChart"),{
    type:"line",
    data:{
      labels:records.map(r=>r.month),
      datasets:[{data:records.map(r=>netAsset(r))}]
    }
  })

  if(pieChart) pieChart.destroy()
  pieChart = new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
      labels:categories.filter(c=>c.side==="asset").map(c=>c.name),
      datasets:[{
        data:categories.filter(c=>c.side==="asset")
          .map(c=>latestRecord.values[c.name]||0)
      }]
    }
  })

  renderBS()
  renderMoM()
  renderBenchmark()
  renderInputs()
  renderCategoryList()
}

function renderBS(){
  const r = latest()

  const rows = categories.map(c=>{
    const v = r.values[c.name]||0
    return `<tr>
      <td>${c.name}</td>
      <td>${c.side}</td>
      <td>${yen(v)}</td>
    </tr>`
  }).join("")

  document.getElementById("bsTable").innerHTML =
    `<table>
      <tr><th>科目</th><th>区分</th><th>金額</th></tr>
      ${rows}
      <tr><td>純資産</td><td>-</td><td>${yen(netAsset(r))}</td></tr>
    </table>`
}

function renderMoM(){
  const r = latest()
  const prev = records[records.length-2]
  if(!prev)return

  const rows = ["資産合計","負債合計","純資産"].map(name=>{
    const current = name==="資産合計"?assetTotal(r):
                    name==="負債合計"?liabilityTotal(r):
                    netAsset(r)

    const p = name==="資産合計"?assetTotal(prev):
              name==="負債合計"?liabilityTotal(prev):
              netAsset(prev)

    const diff = current-p

    return `<tr>
      <td>${name}</td>
      <td>${yen(p)}</td>
      <td>${yen(current)}</td>
      <td>${diff>=0?'+':''}${yen(diff)}</td>
    </tr>`
  }).join("")

  document.getElementById("momTable").innerHTML =
    `<table>
      <tr><th>項目</th><th>前月</th><th>当月</th><th>増減</th></tr>
      ${rows}
    </table>`
}

function calcPlan(){
  const target = Number(document.getElementById("target").value)
  const years = Number(document.getElementById("years").value)

  const now = netAsset(latest())

  const need = target-now
  const cagr = Math.pow(target/now,1/years)-1

  document.getElementById("planResult").innerHTML =
    `
    必要年率：${(cagr*100).toFixed(1)}%<br>
    必要月次：${yen(need/(years*12))}
    `
}

function renderBenchmark(){

  const age = Number(document.getElementById("age").value)
  const bucket = age<30?20:age<40?30:age<50?40:age<60?50:age<70?60:70

  const household = document.getElementById("household").value
  const basis = document.getElementById("basis").value

  const stat = benchmarkData[household][bucket][basis]
  const val = assetTotal(latest())

  const ratio = val/stat*100

  document.getElementById("benchmark").innerHTML =
    `
    統計：${yen(stat)}<br>
    あなた：${yen(val)}<br>
    ${ratio.toFixed(1)}%
    `

  document.getElementById("benchmarkRank").innerText =
    `同世代比 ${ratio.toFixed(0)}%`
}

function renderInputs(){

  document.getElementById("inputs").innerHTML =
    categories.map(c=>`
      <div>
        ${c.name}
        <input id="input_${c.name}">
      </div>
    `).join("")
}

function saveMonth(){

  const month = document.getElementById("month").value

  const values={}
  categories.forEach(c=>{
    values[c.name]=Number(document.getElementById("input_"+c.name).value)||0
  })

  records.push({month,values})
  saveState()
  render()
}

function addCategory(){

  const name=document.getElementById("newName").value
  const side=document.getElementById("newSide").value
  const type=document.getElementById("newType").value

  categories.push({name,side,type})
  saveState()
  render()
}

function renderCategoryList(){

  document.getElementById("categoryList").innerHTML =
    categories.map(c=>`
      <div>
        ${c.name}（${c.side}）
      </div>
    `).join("")
}

render()
</script>

</body>
</html>
