<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>個人決算ダッシュボード</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --navy:#0f172a;
  --accent:#10b981;
  --text:#111827;
  --sub:#6b7280;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:var(--bg);
  color:var(--text);
}
.container{max-width:1100px;margin:auto;padding:20px}
.card{
  background:var(--card);
  border-radius:16px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

/* HERO */
.hero{
  background:var(--navy);
  color:white;
}
.net{
  font-size:64px;
  font-weight:800;
  margin:10px 0;
}
.sub{color:#9ca3af}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}
@media(max-width:800px){
  .grid{grid-template-columns:1fr}
}

/* ANALYSIS */
.analysis{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
.box{
  padding:14px;
  border-radius:12px;
}
.profit{background:#ecfdf5}
.safe{background:#eff6ff}
.growth{background:#fef3c7}

/* BUTTON */
.btn{
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--navy);
  color:white;
  font-weight:700;
  cursor:pointer;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}
</style>
</head>

<body>
<div class="container">

<!-- ダッシュボード -->
<div id="dashboard">

<div class="card hero">
  <div>あなたという会社の、月次決算</div>
  <div class="net" id="netAssets">¥0</div>
  <div class="sub" id="mom">前月比 -</div>
</div>

<div class="grid">
  <div class="card">
    <h3>純資産推移</h3>
    <canvas id="trendChart"></canvas>
  </div>

  <div class="card">
    <h3>BS（資産 vs 負債+純資産）</h3>
    <canvas id="bsChart"></canvas>
  </div>
</div>

<div class="card">
  <h3>分析</h3>
  <div class="analysis">

    <div class="box profit">
      <b>収益性</b><br>
      ROA: <span id="roa"></span><br>
      ROE: <span id="roe"></span><br>
      ROIC: <span id="roic"></span>
    </div>

    <div class="box safe">
      <b>安全性</b><br>
      自己資本比率: <span id="equity"></span><br>
      負債比率: <span id="debt"></span>
    </div>

    <div class="box growth">
      <b>成長性</b><br>
      総資本成長率: <span id="growth"></span>
    </div>

  </div>
</div>

<button class="btn" onclick="goInput()">月次決算入力へ</button>

</div>

<!-- 入力画面 -->
<div id="inputPage" style="display:none">

<div class="card">
  <button onclick="goBack()">← 戻る</button>
  <h3>月次決算入力</h3>

  <input id="month" placeholder="2026/05">

  <div id="inputs"></div>

  <button class="btn" onclick="save()">保存</button>
</div>

</div>

</div>

<script>

/* ---------- 安全ロード ---------- */
function loadData(){
  try{
    const r = JSON.parse(localStorage.getItem("records"));
    if(!r || r.length===0) throw "err";
    return r;
  }catch{
    const d = [
      {month:"2026/03",total:5672884},
      {month:"2026/04",total:6156754}
    ];
    localStorage.setItem("records",JSON.stringify(d));
    return d;
  }
}

let records = loadData();

/* ---------- 表示 ---------- */
function render(){
  const latest = records[records.length-1];
  const prev = records[records.length-2];

  document.getElementById("netAssets").innerText =
    "¥"+latest.total.toLocaleString();

  const diff = prev ? latest.total - prev.total : 0;
  document.getElementById("mom").innerText =
    "前月比 "+ (diff>=0?"+":"") + diff.toLocaleString();

  renderCharts();
  renderAnalysis();
}

/* ---------- グラフ ---------- */
function renderCharts(){
  const labels = records.map(r=>r.month);
  const data = records.map(r=>r.total);

  new Chart(document.getElementById("trendChart"),{
    type:"line",
    data:{labels,datasets:[{data}]}
  });

  new Chart(document.getElementById("bsChart"),{
    type:"bar",
    data:{
      labels:["BS"],
      datasets:[
        {label:"資産",data:[data[data.length-1]]},
        {label:"負債+純資産",data:[data[data.length-1]]}
      ]
    }
  });
}

/* ---------- 分析 ---------- */
function renderAnalysis(){
  const latest = records[records.length-1];
  const prev = records[records.length-2];

  const growth = prev ? (latest.total/prev.total-1)*100 : 0;

  document.getElementById("growth").innerText =
    growth.toFixed(1)+"%";

  document.getElementById("roa").innerText = "5.2%";
  document.getElementById("roe").innerText = "8.1%";
  document.getElementById("roic").innerText = "6.4%";
  document.getElementById("equity").innerText = "65%";
  document.getElementById("debt").innerText = "35%";
}

/* ---------- 入力 ---------- */
function goInput(){
  document.getElementById("dashboard").style.display="none";
  document.getElementById("inputPage").style.display="block";
}

function goBack(){
  document.getElementById("dashboard").style.display="block";
  document.getElementById("inputPage").style.display="none";
}

function save(){
  const month = document.getElementById("month").value;
  let total = 0;

  document.querySelectorAll(".val").forEach(i=>{
    total += Number(i.value.replace(/,/g,''))||0;
  });

  records.push({month,total});
  localStorage.setItem("records",JSON.stringify(records));

  goBack();
  render();
}

/* ---------- 初期UI ---------- */
function buildInputs(){
  const el = document.getElementById("inputs");
  ["預金","投資","年金"].forEach(n=>{
    el.innerHTML += `<input class="val" placeholder="${n}">`;
  });
}

buildInputs();
render();

</script>
</body>
</html>
